name: Test

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run tests
        run: tests/run.sh

      - name: Run ShellCheck
        run: shellcheck treecat.sh tests/run.sh
